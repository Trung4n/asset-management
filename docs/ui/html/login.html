<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Asset Management System — Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap"
      rel="stylesheet"
    />

    <style>
      /* ── Reset & Base ─────────────────────────────────────────── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --navy-950: #06091a;
        --navy-900: #0b0f2a;
        --navy-800: #111638;
        --navy-700: #1a2050;
        --accent: #3b82f6;
        --accent-hover: #2563eb;
        --accent-glow: rgba(59, 130, 246, 0.35);
        --purple: #7c3aed;
        --purple-lt: #a78bfa;
        --text-primary: #e8eaf2;
        --text-secondary: #8892b0;
        --text-muted: #4a5578;
        --border: rgba(255, 255, 255, 0.08);
        --input-bg: rgba(255, 255, 255, 0.05);
        --input-border: rgba(255, 255, 255, 0.12);
        --input-focus: #3b82f6;
        --card-bg: rgba(11, 15, 42, 0.92);
        --error: #f87171;
      }

      html,
      body {
        height: 100%;
        font-family: "DM Sans", sans-serif;
        background: var(--navy-950);
        color: var(--text-primary);
        overflow: hidden;
      }

      /* ── Layout: Two-Panel ────────────────────────────────────── */
      .page {
        display: grid;
        grid-template-columns: 1fr 420px;
        height: 100vh;
        position: relative;
      }

      /* ── Left Atmospheric Panel ───────────────────────────────── */
      .panel-visual {
        position: relative;
        overflow: hidden;
        background: var(--navy-950);
      }

      /* Grid floor */
      .panel-visual::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(59, 130, 246, 0.08) 1px, transparent 1px),
          linear-gradient(90deg, rgba(59, 130, 246, 0.08) 1px, transparent 1px);
        background-size: 60px 60px;
        transform: perspective(800px) rotateX(40deg) scale(2.2);
        transform-origin: center bottom;
        animation: gridShift 20s linear infinite;
      }

      @keyframes gridShift {
        from {
          background-position: 0 0;
        }
        to {
          background-position: 0 60px;
        }
      }

      /* Depth gradient */
      .panel-visual::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(
            ellipse 70% 60% at 30% 40%,
            rgba(124, 58, 237, 0.28) 0%,
            transparent 60%
          ),
          radial-gradient(
            ellipse 50% 50% at 70% 70%,
            rgba(59, 130, 246, 0.18) 0%,
            transparent 60%
          ),
          linear-gradient(
            to bottom,
            var(--navy-950) 0%,
            transparent 30%,
            transparent 70%,
            var(--navy-950) 100%
          );
        pointer-events: none;
      }

      /* Floating orbs */
      .orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(60px);
        pointer-events: none;
        animation: drift 8s ease-in-out infinite alternate;
      }
      .orb-1 {
        width: 320px;
        height: 320px;
        background: radial-gradient(
          circle,
          rgba(124, 58, 237, 0.5) 0%,
          transparent 70%
        );
        top: 10%;
        left: 15%;
        animation-delay: 0s;
      }
      .orb-2 {
        width: 200px;
        height: 200px;
        background: radial-gradient(
          circle,
          rgba(59, 130, 246, 0.5) 0%,
          transparent 70%
        );
        bottom: 25%;
        right: 8%;
        animation-delay: -3s;
      }
      .orb-3 {
        width: 140px;
        height: 140px;
        background: radial-gradient(
          circle,
          rgba(167, 139, 250, 0.4) 0%,
          transparent 70%
        );
        top: 55%;
        left: 40%;
        animation-delay: -6s;
      }

      @keyframes drift {
        from {
          transform: translate(0, 0) scale(1);
        }
        to {
          transform: translate(20px, -30px) scale(1.08);
        }
      }

      /* Scan line overlay */
      .scanlines {
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
          to bottom,
          transparent 0px,
          transparent 3px,
          rgba(0, 0, 0, 0.04) 3px,
          rgba(0, 0, 0, 0.04) 4px
        );
        pointer-events: none;
        z-index: 1;
      }

      /* Visual text content */
      .visual-content {
        position: absolute;
        bottom: 48px;
        left: 48px;
        z-index: 2;
      }

      .visual-label {
        font-family: "Syne", sans-serif;
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--purple-lt);
        margin-bottom: 12px;
        opacity: 0.8;
      }

      .visual-heading {
        font-family: "Syne", sans-serif;
        font-size: clamp(22px, 2.4vw, 32px);
        font-weight: 800;
        line-height: 1.2;
        color: var(--text-primary);
        max-width: 340px;
        text-shadow: 0 0 40px rgba(124, 58, 237, 0.5);
      }

      .visual-heading em {
        font-style: normal;
        background: linear-gradient(90deg, var(--purple-lt), var(--accent));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .visual-tag {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-top: 20px;
        padding: 6px 14px;
        border: 1px solid rgba(124, 58, 237, 0.3);
        border-radius: 100px;
        font-size: 11px;
        font-weight: 500;
        color: var(--purple-lt);
        background: rgba(124, 58, 237, 0.1);
        backdrop-filter: blur(8px);
      }

      .visual-tag::before {
        content: "";
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--purple-lt);
        box-shadow: 0 0 8px var(--purple-lt);
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.5;
          transform: scale(0.85);
        }
      }

      /* Vertical logo text top-left */
      .brand-mark {
        position: absolute;
        top: 32px;
        left: 48px;
        z-index: 2;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .brand-icon {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        background: linear-gradient(135deg, var(--purple), var(--accent));
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 16px var(--accent-glow);
      }

      .brand-icon svg {
        width: 16px;
        height: 16px;
        fill: none;
        stroke: #fff;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .brand-name {
        font-family: "Syne", sans-serif;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.04em;
        color: var(--text-primary);
      }

      /* ── Right Form Panel ─────────────────────────────────────── */
      .panel-form {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: var(--card-bg);
        backdrop-filter: blur(24px);
        border-left: 1px solid var(--border);
        padding: 48px 40px;
        z-index: 3;
      }

      /* Subtle top accent line */
      .panel-form::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--accent),
          transparent
        );
      }

      /* ── Form Card ────────────────────────────────────────────── */
      .form-card {
        width: 100%;
        max-width: 340px;
        animation: fadeUp 0.6s ease both;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Header */
      .form-header {
        text-align: center;
        margin-bottom: 36px;
      }

      .form-title {
        font-family: "Syne", sans-serif;
        font-size: 22px;
        font-weight: 700;
        color: var(--text-primary);
        letter-spacing: -0.01em;
        margin-bottom: 6px;
      }

      .form-subtitle {
        font-size: 13px;
        font-weight: 300;
        color: var(--text-secondary);
        letter-spacing: 0.01em;
      }

      /* Divider */
      .divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 28px 0;
        color: var(--text-muted);
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border);
      }

      /* Field */
      .field {
        margin-bottom: 16px;
      }

      .field label {
        display: block;
        font-size: 11.5px;
        font-weight: 500;
        color: var(--text-secondary);
        letter-spacing: 0.06em;
        text-transform: uppercase;
        margin-bottom: 7px;
      }

      .input-wrap {
        position: relative;
      }

      .input-wrap .icon {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
        pointer-events: none;
        transition: color 0.2s;
      }

      .input-wrap .icon svg {
        width: 15px;
        height: 15px;
        stroke: currentColor;
        fill: none;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .field input {
        width: 100%;
        padding: 11px 12px 11px 38px;
        background: var(--input-bg);
        border: 1px solid var(--input-border);
        border-radius: 8px;
        font-family: "DM Sans", sans-serif;
        font-size: 13.5px;
        font-weight: 300;
        color: var(--text-primary);
        outline: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s,
          background 0.2s;
        -webkit-appearance: none;
      }

      .field input::placeholder {
        color: var(--text-muted);
        font-weight: 300;
      }

      .field input:focus {
        border-color: var(--input-focus);
        background: rgba(59, 130, 246, 0.06);
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
      }

      .field input:focus ~ .icon,
      .field input:focus + .icon {
        color: var(--accent);
      }

      /* Fix: icon color on focus */
      .input-wrap:focus-within .icon {
        color: var(--accent);
      }

      /* Error */
      .field-error {
        display: flex;
        align-items: center;
        gap: 5px;
        margin-top: 6px;
        font-size: 11.5px;
        color: var(--error);
        opacity: 0;
        transition: opacity 0.2s;
      }

      .field-error.visible {
        opacity: 1;
      }

      .field-error svg {
        width: 12px;
        height: 12px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
        flex-shrink: 0;
      }

      /* Password row */
      .pwd-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 7px;
      }

      .pwd-row label {
        font-size: 11.5px;
        font-weight: 500;
        color: var(--text-secondary);
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .link {
        font-size: 11.5px;
        color: var(--accent);
        text-decoration: none;
        font-weight: 400;
        transition:
          color 0.2s,
          opacity 0.2s;
      }
      .link:hover {
        color: var(--purple-lt);
      }

      /* Toggle password visibility */
      .toggle-pwd {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        padding: 0;
        line-height: 0;
        transition: color 0.2s;
      }
      .toggle-pwd:hover {
        color: var(--text-primary);
      }
      .toggle-pwd svg {
        width: 15px;
        height: 15px;
        stroke: currentColor;
        fill: none;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      /* Remember */
      .remember-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 24px;
        margin-top: 4px;
      }

      .remember-row input[type="checkbox"] {
        width: 15px;
        height: 15px;
        accent-color: var(--accent);
        cursor: pointer;
      }

      .remember-row label {
        font-size: 12.5px;
        color: var(--text-secondary);
        cursor: pointer;
        user-select: none;
      }

      /* Submit */
      .btn-submit {
        width: 100%;
        padding: 13px;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 8px;
        font-family: "Syne", sans-serif;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        cursor: pointer;
        transition:
          background 0.2s,
          box-shadow 0.2s,
          transform 0.12s;
        box-shadow: 0 4px 20px rgba(59, 130, 246, 0.35);
      }

      .btn-submit:hover {
        background: var(--accent-hover);
        box-shadow: 0 6px 28px rgba(59, 130, 246, 0.5);
      }

      .btn-submit:active {
        transform: scale(0.985);
      }

      /* Footer */
      .form-footer {
        margin-top: 28px;
        text-align: center;
        font-size: 11px;
        color: var(--text-muted);
      }

      .form-footer a {
        color: var(--text-secondary);
        text-decoration: none;
        margin: 0 8px;
        transition: color 0.2s;
      }
      .form-footer a:hover {
        color: var(--text-primary);
      }

      /* ── Responsive ────────────────────────────────────────────── */
      @media (max-width: 720px) {
        html,
        body {
          overflow: auto;
        }

        .page {
          grid-template-columns: 1fr;
          grid-template-rows: 220px 1fr;
          height: auto;
          min-height: 100vh;
        }

        .panel-visual {
          grid-row: 1;
        }

        .visual-content {
          bottom: 24px;
          left: 24px;
        }
        .brand-mark {
          top: 20px;
          left: 24px;
        }

        .visual-heading {
          font-size: 20px;
        }

        .panel-form {
          grid-row: 2;
          border-left: none;
          border-top: 1px solid var(--border);
          padding: 40px 24px 48px;
        }

        .panel-form::before {
          top: 0;
          left: 0;
          right: 0;
          bottom: auto;
          width: auto;
          height: 2px;
        }
      }

      @media (max-width: 400px) {
        .panel-form {
          padding: 32px 20px 40px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <!-- ─── Left Visual Panel ─────────────────────────── -->
      <aside class="panel-visual" aria-hidden="true">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="scanlines"></div>

        <div class="brand-mark">
          <div class="brand-icon">
            <svg viewBox="0 0 24 24">
              <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
            </svg>
          </div>
          <span class="brand-name">AMS Platform</span>
        </div>

        <div class="visual-content">
          <p class="visual-label">Enterprise Grade</p>
          <h1 class="visual-heading">
            Intelligent<br /><em>Asset Management</em><br />at Scale
          </h1>
          <span class="visual-tag">System v4.2 — Operational</span>
        </div>
      </aside>

      <!-- ─── Right Form Panel ──────────────────────────── -->
      <section class="panel-form">
        <div class="form-card">
          <header class="form-header">
            <h2 class="form-title">Asset Management System</h2>
            <p class="form-subtitle">Sign in to your account</p>
          </header>

          <!-- Email -->
          <div class="field">
            <label for="email">Email Address</label>
            <div class="input-wrap">
              <span class="icon">
                <svg viewBox="0 0 24 24">
                  <rect x="2" y="4" width="20" height="16" rx="2" />
                  <polyline points="2,4 12,13 22,4" />
                </svg>
              </span>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="you@company.com"
                autocomplete="email"
              />
            </div>
            <p class="field-error" id="email-error" role="alert">
              <svg viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10" />
                <line x1="12" y1="8" x2="12" y2="12" />
                <line x1="12" y1="16" x2="12.01" y2="16" />
              </svg>
              Please enter a valid email address.
            </p>
          </div>

          <!-- Password -->
          <div class="field">
            <div class="pwd-row">
              <label for="password">Password</label>
              <a href="#" class="link">Forgot password?</a>
            </div>
            <div class="input-wrap">
              <span class="icon">
                <svg viewBox="0 0 24 24">
                  <rect x="3" y="11" width="18" height="11" rx="2" />
                  <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                </svg>
              </span>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="••••••••••"
                autocomplete="current-password"
              />
              <button
                class="toggle-pwd"
                type="button"
                aria-label="Toggle password visibility"
                onclick="togglePwd(this)"
              >
                <svg viewBox="0 0 24 24" class="eye-show">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
            <p class="field-error" id="pwd-error" role="alert">
              <svg viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10" />
                <line x1="12" y1="8" x2="12" y2="12" />
                <line x1="12" y1="16" x2="12.01" y2="16" />
              </svg>
              Password must be at least 8 characters.
            </p>
          </div>

          <!-- Remember -->
          <div class="remember-row">
            <input type="checkbox" id="remember" name="remember" />
            <label for="remember">Remember me for 30 days</label>
          </div>

          <!-- Submit -->
          <button type="button" class="btn-submit" onclick="handleLogin()">
            Sign In
          </button>

          <!-- Footer links -->
          <footer class="form-footer">
            <a href="#">Privacy Policy</a>
            <a href="#">Terms of Service</a>
            <a href="#">Support</a>
          </footer>
        </div>
      </section>
    </main>

    <script>
      /* Toggle password visibility */
      function togglePwd(btn) {
        const input = btn.closest(".input-wrap").querySelector("input");
        const isHidden = input.type === "password";
        input.type = isHidden ? "text" : "password";
        btn.querySelector("svg").innerHTML = isHidden
          ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
          : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
      }

      /* Basic client-side validation demo */
      function handleLogin() {
        const email = document.getElementById("email");
        const password = document.getElementById("password");
        const emailErr = document.getElementById("email-error");
        const pwdErr = document.getElementById("pwd-error");

        let valid = true;

        const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value.trim());
        emailErr.classList.toggle(
          "visible",
          !emailOk && email.value.length > 0,
        );
        if (!emailOk) {
          valid = false;
        }

        const pwdOk = password.value.length >= 8;
        pwdErr.classList.toggle("visible", !pwdOk && password.value.length > 0);
        if (!pwdOk) {
          valid = false;
        }

        if (valid && email.value && password.value) {
          const btn = document.querySelector(".btn-submit");
          btn.textContent = "Signing In…";
          btn.style.opacity = ".7";
          btn.style.pointerEvents = "none";
          window.location.href = "./dashboard.html";
        }
      }
    </script>
  </body>
</html>
